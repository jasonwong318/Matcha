<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Reconcile AI 一體化極速畫布</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <nav class="bg-slate-950 text-white px-6 py-4 shadow-md flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="bg-blue-600 p-2 rounded-lg"><i data-lucide="zap" class="w-6 h-6"></i></div>
            <div>
                <h1 class="text-xl font-bold tracking-wide">Vibe Coding Lab</h1>
                <p class="text-xs text-gray-400">Pure Client-Side AI Auditor (2026 Edition)</p>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 space-y-6">
        
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 space-y-4">
            <h2 class="text-lg font-bold flex items-center gap-2"><i data-lucide="sliders" class="text-blue-600"></i> 第一步：配置與數據輸入</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">選擇 AI 模型</label>
                    <select id="model-select" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm">
                        <option value="gemini">Gemini 3.5 Flash</option>
                        <option value="glm4">GLM-4-Flash (智譜AI)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" id="api-key-label">輸入 API Key</label>
                    <input type="password" id="api-key" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm font-mono" placeholder="AI Studio 申請的 AIzaSy...">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2">
                <div class="border border-gray-200 p-4 rounded-lg bg-slate-50">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">1. 上傳公司會計帳 (Excel / .xlsx)</label>
                    <input type="file" id="file-ledger" accept=".xlsx, .xls, .csv" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>
                <div class="border border-gray-200 p-4 rounded-lg bg-slate-50">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">2. 上傳銀行流水 (電子PDF / 照片皆可)</label>
                    <input type="file" id="file-bank" accept=".pdf, .png, .jpg, .jpeg" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                </div>
            </div>

            <button onclick="startReconciliation()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow transition flex items-center justify-center space-x-2">
                <i data-lucide="play"></i>
                <span>啟動 AI 智慧交叉核對</span>
            </button>
        </div>

        <div id="result-zone" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <p class="text-sm text-gray-500 font-medium">對帳結果狀態</p>
                    <p id="txt-status" class="text-2xl font-bold mt-2">-</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <p class="text-sm text-gray-500 font-medium">AI 抓出異常筆數</p>
                    <p id="txt-count" class="text-2xl font-bold mt-2">-</p>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="p-5 border-b border-gray-200 bg-slate-50 flex items-center space-x-2">
                    <i data-lucide="alert-triangle" class="text-red-500"></i>
                    <h3 class="font-bold text-lg text-slate-900" id="report-title">AI 兩方比對異常報告</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100/70 text-gray-600 text-sm font-semibold border-b border-gray-200">
                                <th class="px-6 py-3.5">交易日期</th>
                                <th class="px-6 py-3.5">金額</th>
                                <th class="px-6 py-3.5">摘要描述</th>
                                <th class="px-6 py-3.5">來源</th>
                                <th class="px-6 py-3.5 text-red-600" id="reason-header">AI 專家審計推測原因 (Reason)</th>
                            </tr>
                        </thead>
                        <tbody id="report-table-body" class="divide-y divide-gray-200 text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let excelTextData = "";

        // 當上傳 Excel 時，前端直接解析成純文字
        document.getElementById('file-ledger').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                excelTextData = XLSX.utils.sheet_to_csv(firstSheet);
                console.log("Excel 解析成功！");
            };
            reader.readAsArrayBuffer(file);
        });

        document.getElementById('model-select').addEventListener('change', function(e) {
            const label = document.getElementById('api-key-label');
            document.getElementById('api-key').value = '';
            if (e.target.value === 'gemini') {
                label.innerText = '輸入 Gemini API Key';
                document.getElementById('api-key').placeholder = 'AI Studio 申請的 AIzaSy...';
            } else {
                label.innerText = '輸入智譜 (GLM) API Key';
                document.getElementById('api-key').placeholder = '智譜開放平台申請的...';
            }
        });

        // 核心對帳邏輯
        async function startReconciliation() {
            const apiKey = document.getElementById('api-key').value;
            const bankFile = document.getElementById('file-bank').files[0];
            
            const model = document.getElementById('model-select').value;
            if(!apiKey) return alert("請輸入 API Key");
            if(!excelTextData) return alert("請先上傳 Excel 分類帳");
            if(!bankFile) return alert("請上傳 PDF 或照片流水");

            const modelName = model === 'gemini' ? 'Gemini 3.5 Flash' : 'GLM-4-Flash';
            document.getElementById('report-title').innerText = `${modelName} AI 兩方比對異常報告`;
            document.getElementById('reason-header').innerText = `${modelName} 專家審計推測原因 (Reason)`;

            document.getElementById('result-zone').classList.remove('hidden');
            const tbody = document.getElementById('report-table-body');
            tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-12 text-center text-blue-600 font-medium"><i data-lucide="loader" class="animate-spin inline mr-2"></i>${modelName} 正在瘋狂讀取文件並進行對帳，請稍候約 10 秒...</td></tr>`;
            lucide.createIcons();

            try {
                const reader = new FileReader();
                const dataUrl = await new Promise((resolve, reject) => {
                    reader.readAsDataURL(bankFile);
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                });
                const base64Data = dataUrl.split(',')[1];
                let mimeType = bankFile.type || "application/pdf";

                const promptText = `你是一位精通法證會計的審計專家。請幫我交叉比對兩份財務數據：\n1.【公司會計分類帳 (Excel)】:\n${excelTextData}\n2.【隨附的銀行流水文件】\n請找出所有無法匹配的孤立項目，並特別留意金額數字顛倒（Typo）手誤。請嚴格以繁體中文，並遵循以下 JSON 格式回傳，不要包含任何 markdown 標籤或 \`\`\`json 字眼：\n{\n  "status": "Discrepancy_Found",\n  "total_unmatched_count": 1,\n  "unmatched_items": [\n    {"date": "2026-05-20", "amount": -5000, "description": "ATM Cash", "source": "Bank", "reason": "說明文字"}\n  ]\n}`;

                let rawJson;

                if (model === 'gemini') {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiKey}`;
                    const payload = {
                        contents: [{
                            parts: [
                                { inlineData: { mimeType: mimeType, data: base64Data } },
                                { text: promptText }
                            ]
                        }],
                        generationConfig: { responseMimeType: "application/json" }
                    };
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const apiData = await res.json();
                    rawJson = JSON.parse(apiData.candidates[0].content.parts[0].text.trim());
                } else {
                    const url = 'https://open.bigmodel.cn/api/paas/v4/chat/completions';
                    const payload = {
                        model: 'glm-4-flash',
                        messages: [{
                            role: 'user',
                            content: [
                                { type: 'image_url', image_url: { url: dataUrl } },
                                { type: 'text', text: promptText }
                            ]
                        }],
                        response_format: { type: 'json_object' }
                    };
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify(payload)
                    });
                    const apiData = await res.json();
                    rawJson = JSON.parse(apiData.choices[0].message.content.trim());
                }

                // 渲染前端 UI
                document.getElementById('txt-status').innerText = rawJson.status === "Discrepancy_Found" ? "發現不匹配項目" : "數據完全吻合";
                document.getElementById('txt-status').className = rawJson.status === "Discrepancy_Found" ? "text-2xl font-bold text-red-600 mt-2" : "text-2xl font-bold text-emerald-600 mt-2";
                document.getElementById('txt-count').innerText = rawJson.total_unmatched_count + " 筆異常";
                
                tbody.innerHTML = "";
                if(rawJson.unmatched_items.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-12 text-center text-emerald-600 font-medium">🎉 完美！兩方數據完全相符。</td></tr>`;
                    return;
                }

                rawJson.unmatched_items.forEach(item => {
                    const row = document.createElement('tr');
                    row.className = "hover:bg-gray-50 transition";
                    row.innerHTML = `
                        <td class="px-6 py-4 font-mono text-gray-600">${item.date}</td>
                        <td class="px-6 py-4 font-semibold text-slate-900">$${Number(item.amount).toLocaleString()}</td>
                        <td class="px-6 py-4 text-gray-500">${item.description}</td>
                        <td class="px-6 py-4"><span class="px-2.5 py-0.5 rounded text-xs font-semibold ${item.source === 'Bank' ? 'bg-blue-100 text-blue-800':'bg-indigo-100 text-indigo-800'}">${item.source}</span></td>
                        <td class="px-6 py-4 text-gray-700 bg-red-50/30 font-medium border-l-2 border-red-400">${item.reason}</td>
                    `;
                    tbody.appendChild(row);
                });
                lucide.createIcons();

            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-12 text-center text-red-600 font-medium">❌ 執行失敗: ${err.message}。請確認您的 API Key 是否正確，以及上傳的文件是否有效。</td></tr>`;
            }
        }
    </script>
</body>
</html>
